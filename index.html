<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card - Functionality</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
   <div class="card-container" id="cardContainer">
    <div class="card" id="card">
        <div class="card-face card-front">
            <div class="icon">📱</div>
            <h2>Hello Explorer!</h2>
            <p>Welcome to the world of CSS transitions. Click this card to discover what's on the other side</p>
            <div class="hint">Click to flip</div>
        </div>

        <div class="card-face card-back">
            <div class="icon">📱</div>
            <h2>You found it!</h2>
            <p>Great job! This is the back of the card. CSS 3d transform makes this smooth flip effect possible</p>
            <div class="hint">Click to flip</div>
        </div>
    </div>
   </div> 
</body>
</html>
